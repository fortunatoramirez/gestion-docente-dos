<%- include('partials/head.html', { title }) %>
<body class="app-screen">
  <main class="main-content narrow-content">
    <header class="page-header">
      <div>
        <p class="eyebrow">Profesores</p>
        <h1><%= title %></h1>
      </div>
      <a class="ghost-button" href="/admin#profesores">Volver</a>
    </header>

    <% if (error) { %>
      <div class="notice notice-error"><%= error %></div>
    <% } %>

    <form class="admin-form" action="<%= action %>" method="post">
      <section class="form-section">
        <div class="readonly-grid">
          <label>
            <span>Numero de empleado</span>
            <input name="employee_number" value="<%= professor.employee_number || '' %>" required>
          </label>
          <label>
            <span>Departamento</span>
            <input name="department" value="<%= professor.department || '' %>">
          </label>
        </div>

        <label class="wide-field">
          <span>Nombre completo</span>
          <input name="full_name" value="<%= professor.full_name || '' %>" required>
        </label>

        <label class="wide-field">
          <span>Correo</span>
          <input name="email" type="email" value="<%= professor.email || '' %>">
        </label>

        <fieldset class="choice-field">
          <legend>Estado</legend>
          <label>
            <input type="radio" name="active" value="1" <%= Number(professor.active) !== 0 ? 'checked' : '' %>>
            <span>Activo</span>
          </label>
          <label>
            <input type="radio" name="active" value="0" <%= Number(professor.active) === 0 ? 'checked' : '' %>>
            <span>Inactivo</span>
          </label>
        </fieldset>
      </section>

      <div class="form-actions">
        <a class="ghost-button" href="/admin#profesores">Cancelar</a>
        <button class="primary-button" type="submit">Guardar</button>
      </div>
    </form>
  </main>
</body>
</html>
